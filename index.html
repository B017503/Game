    <title>OS</title>
    <style>
        body { 
            background: #0a0a0c; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .box { 
            border: 1px solid #1f1f23; 
            padding: 50px 40px; 
            border-radius: 20px; 
            text-align: center; 
            background: #111114; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            max-width: 460px;
        }
        .bookmark-btn {
            display: inline-block;
            padding: 18px 40px;
            background: #ff5f1f;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            cursor: grab;
            margin: 30px 0 20px;
            font-size: 19px;
            letter-spacing: 1.5px;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #b34215;
            user-select: none;
        }
        .bookmark-btn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 0 #b34215;
        }
        .bookmark-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 2px 0 #b34215;
        }
        h1 { 
            margin-bottom: 12px; 
            letter-spacing: 3px; 
            color: #fff; 
            font-size: 28px;
        }
        p { 
            color: #52525b; 
            line-height: 1.6; 
            font-size: 15px;
        }
        .note {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 40px;
        }
        b { color: #ff5f1f; }
    </style>
</head>
