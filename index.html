<!DOCTYPE html>
<html>
<head>
    <title>P2P OS Launcher</title>
    <style>
        body { background: #0a0a0c; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #1f1f23; padding: 40px; border-radius: 20px; text-align: center; background: #111114; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .bookmark-btn {
            display: inline-block;
            padding: 18px 35px;
            background: #ff5f1f;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            cursor: move;
            margin-top: 25px;
            font-size: 18px;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 0 #b34215;
        }
        .bookmark-btn:hover { transform: translateY(-2px); }
        .bookmark-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b34215; }
        h1 { margin-bottom: 10px; letter-spacing: 2px; color: #fff; }
        p { color: #52525b; max-width: 400px; line-height: 1.6; font-size: 14px; }
        b { color: #ff5f1f; }
    </style>
</head>
<body>

    <div class="box">
        <h1>📟 ECLIPSE_SYSTEM_V8</h1>
        <p>Drag the orange button below to your <b>Bookmarks Bar</b><br>(Ctrl+Shift+B if you don't see it).</p>
        
        <a class="bookmark-btn" href="#">LAUNCH_OS</a>
        
        <p style="font-size: 11px; margin-top: 30px; opacity: 0.6;">Features: P2P Pong, Secure Chat, Global Notifications, and ESC to Stealth-Hide.</p>
    </div>

    <script>
        // The full, fixed V8 script from our conversation
        const mainScript = `(function(){const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});let dc=null,isHost=false,userName="User_"+Math.floor(Math.random()*99),unreadCount=0;const ui=document.createElement('div');ui.style.cssText="position:fixed;top:50px;left:50px;width:600px;height:400px;background:#0a0a0c;color:#e2e8f0;z-index:10000;font-family:'Segoe UI',system-ui;display:flex;border-radius:12px;border:1px solid #1f1f23;box-shadow:0 20px 50px rgba(0,0,0,0.7);overflow:hidden;transition:opacity 0.2s ease;";const side=document.createElement('div');side.style.cssText="width:60px;background:#111114;display:flex;flex-direction:column;align-items:center;padding:20px 0;border-right:1px solid #1f1f23;gap:25px;";const dot=document.createElement('div');dot.style.cssText="width:10px;height:10px;border-radius:50%;background:#3f3f46;transition:0.3s;";side.appendChild(dot);const createIcon=t=>{const i=document.createElement('div');i.textContent=t;i.style.cssText="cursor:pointer;font-size:18px;opacity:0.4;transition:0.2s;user-select:none;";i.onmouseover=()=>i.style.opacity="1";i.onmouseout=()=>{if(i.getAttribute('active')!=='true')i.style.opacity="0.4"};return i};const iG=createIcon("🎮"),chatWrapper=document.createElement('div');chatWrapper.style.position="relative";const iC=createIcon("💬"),badge=document.createElement('div');badge.style.cssText="position:absolute;top:-5px;right:-8px;background:#ff3b30;color:white;font-size:9px;font-weight:bold;padding:2px 5px;border-radius:10px;display:none;pointer-events:none;border:2px solid #111114;";chatWrapper.append(iC,badge);const iS=createIcon("⚙️");side.append(iG,chatWrapper,iS);const main=document.createElement('div');main.style.cssText="flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;";const header=document.createElement('div');header.style.cssText="padding:15px 25px;display:flex;justify-content:space-between;align-items:center;cursor:move;background:rgba(255,255,255,0.02);flex-shrink:0;";const hTitle=document.createElement('span');hTitle.textContent="ECLIPSE_SYSTEM";hTitle.style.cssText="font-size:10px;font-weight:800;letter-spacing:2px;color:#52525b;";header.appendChild(hTitle);const gameC=document.createElement('canvas');gameC.width=540;gameC.height=340;gameC.style.cssText="display:none;background:#000;";const chatV=document.createElement('div');chatV.style.cssText="flex:1;display:none;flex-direction:column;padding:15px;overflow:hidden;";const mB=document.createElement('div');mB.style.cssText="flex:1;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;padding-right:5px;";const inp=document.createElement('input');inp.placeholder="Message...";inp.style.cssText="background:#18181b;border:1px solid #27272a;color:#fff;padding:10px 15px;border-radius:20px;outline:none;flex-shrink:0;";chatV.append(mB,inp);const setV=document.createElement('div');setV.style.cssText="flex:1;display:flex;flex-direction:column;padding:40px;gap:20px;";const nameInp=document.createElement('input');nameInp.placeholder="Set Display Name";nameInp.style.cssText="background:transparent;border:none;border-bottom:1px solid #27272a;color:#ff5f1f;font-size:24px;outline:none;";const btnRow=document.createElement('div');btnRow.style.cssText="display:flex;gap:10px;";const bO=document.createElement('button');bO.textContent="HOST SESSION";const bJ=document.createElement('button');bJ.textContent="JOIN PEER";const bS="flex:1;padding:15px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;font-size:11px;";bO.style.cssText=bS+"background:#ff5f1f;color:#fff;";bJ.style.cssText=bS+"background:#1f1f23;color:#a1a1aa;";const statusBox=document.createElement('div');statusBox.style.cssText="font-size:11px;color:#52525b;";statusBox.textContent="AWAITING CONFIGURATION...";btnRow.append(bO,bJ);setV.append(nameInp,btnRow,statusBox);main.append(header,gameC,chatV,setV);ui.append(side,main);document.body.appendChild(ui);let ball={x:270,y:170,dx:3,dy:3},pL=170,pR=170;const ctx=gameC.getContext('2d'),log=(m,n,me)=>{if(!me&&chatV.style.display==="none"){unreadCount++;badge.textContent=unreadCount>9?"9+":unreadCount;badge.style.display="block"}const c=document.createElement('div');c.style.cssText=\`display:flex;flex-direction:column;align-items:\${me?'flex-end':'flex-start'};width:100%;\`;const l=document.createElement('small');l.textContent=n;l.style.cssText="color:#52525b;font-size:10px;margin-bottom:2px;margin-inline:5px;";const b=document.createElement('div');b.textContent=m;b.style.cssText=\`background:\${me?'#ff5f1f':'#1f1f23'};color:\${me?'#000':'#fff'};padding:8px 12px;border-radius:12px;max-width:80%;font-size:13px;word-break:break-word;\`;c.append(l,b);mB.appendChild(c);mB.scrollTop=mB.scrollHeight};function loop(){ctx.fillStyle="#0a0a0c";ctx.fillRect(0,0,540,340);ctx.fillStyle="#ff5f1f";ctx.fillRect(10,pL-40,4,80);ctx.fillRect(526,pR-40,4,80);ctx.beginPath();ctx.arc(ball.x,ball.y,4,0,Math.PI*2);ctx.fill();if(dc&&dc.readyState==="open"&&isHost){ball.x+=ball.dx;ball.y+=ball.dy;if(ball.y<5||ball.y>335)ball.dy*=-1;if(ball.x<20&&Math.abs(ball.y-pL)<45)ball.dx=Math.abs(ball.dx)+0.2;if(ball.x>520&&Math.abs(ball.y-pR)<45)ball.dx=-(Math.abs(ball.dx)+0.2);if(ball.x<0||ball.x>540){ball.x=270;ball.y=170;ball.dx=3*(ball.dx>0?-1:1)}dc.send("G"+JSON.stringify({b:ball,p:pL}))}requestAnimationFrame(loop)}gameC.onmousemove=e=>{const r=gameC.getBoundingClientRect(),y=e.clientY-r.top;if(isHost)pL=y;else{pR=y;if(dc&&dc.readyState==="open")dc.send("P"+Math.floor(y))}};const setupDC=c=>{dc=c;dc.onopen=()=>{dot.style.background="#ff5f1f";dot.style.boxShadow="0 0 10px #ff5f1f";setTab(gameC,iG);loop()};dc.onmessage=e=>{const t=e.data[0],d=e.data.slice(1);if(t==="G"){const s=JSON.parse(d);ball=s.b;pL=s.p}if(t==="P")pR=parseInt(d);if(t==="C"){const j=JSON.parse(d);log(j.m,j.n,false)}}};bO.onclick=async()=>{isHost=true;userName=nameInp.value||userName;setupDC(pc.createDataChannel("chat"));const o=await pc.createOffer();await pc.setLocalDescription(o);pc.onicecandidate=e=>{if(!e.candidate){navigator.clipboard.writeText(JSON.stringify(pc.localDescription));statusBox.textContent="OFFER COPIED. GIVE TO JOINER."}}};bJ.onclick=async()=>{userName=nameInp.value||userName;const r=prompt("PASTE HOST KEY:");if(!r)return;const j=JSON.parse(r);await pc.setRemoteDescription(new RTCSessionDescription(j));if(j.type==="offer"){const a=await pc.createAnswer();await pc.setLocalDescription(a);pc.onicecandidate=e=>{if(!e.candidate){navigator.clipboard.writeText(JSON.stringify(pc.localDescription));statusBox.textContent="ANSWER COPIED. GIVE TO HOST."}}}};pc.ondatachannel=e=>setupDC(e.channel);const setTab=(v,i)=>{[gameC,chatV,setV].forEach(x=>x.style.display="none");[iG,iC,iS].forEach(x=>{x.style.opacity="0.4";x.setAttribute('active','false')});v.style.display=(v===gameC)?"block":"flex";if(i){i.style.opacity="1";i.setAttribute('active','true')}if(v===chatV){unreadCount=0;badge.style.display="none"}};iG.onclick=()=>setTab(gameC,iG);iC.onclick=()=>setTab(chatV,iC);iS.onclick=()=>setTab(setV,iS);inp.onkeydown=e=>{if(e.key==="Enter"&&inp.value.trim()!==""){if(dc&&dc.readyState==="open")dc.send("C"+JSON.stringify({n:userName,m:inp.value}));log(inp.value,userName,true);inp.value=""}};window.addEventListener('keydown',e=>{if(e.key==="Escape")ui.style.display=ui.style.display==="none"?"flex":"none"});let drg=false,off=[0,0];header.onmousedown=e=>{drg=true;off=[ui.offsetLeft-e.clientX,ui.offsetTop-e.clientY]};document.onmousemove=e=>{if(drg){ui.style.left=(e.clientX+off[0])+"px";ui.style.top=(e.clientY+off[1])+"px"}};document.onmouseup=()=>drg=false;setTab(setV,iS)})();`;
        
        // Inject script into button
        const btn = document.querySelector('.bookmark-btn');
        btn.href = "javascript:" + encodeURIComponent(mainScript);
    </script>
</body>
</html>
