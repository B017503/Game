<!DOCTYPE html>
<html>
<head>
    <title>P2P OS Launcher</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #333; padding: 40px; border-radius: 15px; text-align: center; background: #1a1a1a; box-shadow: 0 0 30px rgba(0,255,0,0.1); }
        .bookmark-btn {
            display: inline-block;
            padding: 15px 25px;
            background: #0f0;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: move;
            margin-top: 20px;
            box-shadow: 0 5px 0 #008800;
        }
        .bookmark-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #008800; }
        p { color: #888; max-width: 400px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="box">
        <h1>📟 P2P_OS_V8</h1>
        <p>Drag the green button below to your <b>Bookmarks Bar</b> (Ctrl+Shift+B to show bar).</p>
        
        <a class="bookmark-btn" href="javascript:(function(){/*PASTE_SCRIPT_HERE*/})()">OS</a>
        
        <p style="font-size: 11px; margin-top: 30px;">Once added, go to any website and click the bookmark to launch the hub. Use <b>ESC</b> to hide/show.</p>
    </div>

    <script>
        // This is the V8 script we built, minified into a single line for the bookmarklet
        const mainScript = `(function(){const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});let dc=pc.createDataChannel('chat',{negotiated:false}),isHost=false,score={h:0,c:0},ui=document.createElement('div');ui.style.cssText='position:fixed;top:50px;left:50px;width:400px;height:520px;background:#121212;color:#0f0;z-index:10000;font-family:monospace;display:flex;flex-direction:column;border:2px solid #333;box-shadow:0 0 20px #000;overflow:hidden;';const header=document.createElement('div');header.style.cssText='background:#222;padding:10px;cursor:move;display:flex;justify-content:space-between;border-bottom:2px solid #333;user-select:none;';const title=document.createElement('span');title.textContent='🎮 P2P_EVOLVED_V8';const notif=document.createElement('span');notif.textContent=' MSG ';notif.style.cssText='color:white;background:red;padding:0 5px;border-radius:3px;display:none;font-size:10px;';header.append(title,notif);const tabs=document.createElement('div');tabs.style.cssText='display:flex;background:#1a1a1a;border-bottom:1px solid #333;';const createTab=n=>{const t=document.createElement('div');t.textContent=n;t.style.cssText='flex:1;padding:8px;text-align:center;cursor:pointer;border-right:1px solid #333;font-size:12px;';return t;};const tG=createTab('GAME'),tC=createTab('CHAT'),tS=createTab('SETUP');tabs.append(tG,tC,tS);const gameC=document.createElement('canvas');gameC.width=400;gameC.height=300;const ctx=gameC.getContext('2d');const chatV=document.createElement('div');chatV.style.cssText='flex:1;display:none;flex-direction:column;background:#000;';const mB=document.createElement('div');mB.style.cssText='flex:1;padding:10px;overflow-y:auto;font-size:12px;color:#aaa;';const inp=document.createElement('input');inp.placeholder='> TYPE...';inp.style.cssText='background:#000;color:#0f0;border:none;padding:12px;outline:none;border-top:1px solid #333;';chatV.append(mB,inp);const setV=document.createElement('div');setV.style.cssText='flex:1;padding:20px;display:flex;flex-direction:column;gap:10px;background:#111;';const bO=document.createElement('button');bO.textContent='1. GENERATE OFFER';const bJ=document.createElement('button');bJ.textContent='2. PASTE & CONNECT';setV.append(bO,bJ);ui.append(header,tabs,gameC,chatV,setV);document.body.appendChild(ui);let ball={x:200,y:150,dx:2,dy:2},pL=150,pR=150;function loop(){ctx.fillStyle='#000';ctx.fillRect(0,0,400,300);ctx.setLineDash([5,5]);ctx.strokeStyle='#222';ctx.beginPath();ctx.moveTo(200,0);ctx.lineTo(200,300);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#0f0';ctx.fillRect(10,pL-30,8,60);ctx.fillRect(382,pR-30,8,60);ctx.fillRect(ball.x-4,ball.y-4,8,8);ctx.font='20px Monospace';ctx.fillText(score.h,170,30);ctx.fillText(score.c,210,30);if(isHost&&dc.readyState==='open'){ball.x+=ball.dx;ball.y+=ball.dy;if(ball.y<5||ball.y>295)ball.dy*=-1;if(ball.x<25&&Math.abs(ball.y-pL)<35){ball.dx=Math.abs(ball.dx)+0.2;ball.dy+=(Math.random()-0.5);}if(ball.x>375&&Math.abs(ball.y-pR)<35){ball.dx=-(Math.abs(ball.dx)+0.2);ball.dy+=(Math.random()-0.5);}if(ball.x<0){score.c++;resetBall();}if(ball.x>400){score.h++;resetBall();}dc.send('G'+JSON.stringify({b:ball,p:pL,s:score}));}requestAnimationFrame(loop);}function resetBall(){ball.x=200;ball.y=150;ball.dx=isHost?2:-2;ball.dy=2;}gameC.onmousemove=e=>{if(isHost)pL=e.offsetY;else{pR=e.offsetY;if(dc.readyState==='open')dc.send('P'+e.offsetY);}};const log=(m,c='#888')=>{const d=document.createElement('div');d.style.color=c;d.textContent=m;mB.appendChild(d);mB.scrollTop=mB.scrollHeight;if(chatV.style.display==='none')notif.style.display='inline';};bO.onclick=async()=>{isHost=true;const offer=await pc.createOffer();await pc.setLocalDescription(offer);setTimeout(()=>{navigator.clipboard.writeText(JSON.stringify(pc.localDescription));log('OFFER COPIED.');},500);};bJ.onclick=async()=>{const raw=prompt('PASTE JSON:');if(!raw)return;const json=JSON.parse(raw);await pc.setRemoteDescription(new RTCSessionDescription(json));if(json.type==='offer'){const ans=await pc.createAnswer();await pc.setLocalDescription(ans);setTimeout(()=>{navigator.clipboard.writeText(JSON.stringify(pc.localDescription));log('ANSWER COPIED.');},500);}};tG.onclick=()=>{gameC.style.display='block';chatV.style.display='none';setV.style.display='none';};tC.onclick=()=>{gameC.style.display='none';chatV.style.display='flex';setV.style.display='none';notif.style.display='none';};tS.onclick=()=>{gameC.style.display='none';chatV.style.display='none';setV.style.display='flex';};inp.onkeydown=e=>{if(e.key==='Enter'&&inp.value){dc.send('C'+inp.value);log('YOU: '+inp.value,'#fff');inp.value='';}};const setupDC=chan=>{chan.onopen=()=>{log('CONNECTED!','#0f0');loop();};chan.onmessage=e=>{const t=e.data[0],d=e.data.slice(1);if(t==='C')log('FRIEND: '+d,'#00bcff');if(t==='P')pR=parseInt(d);if(t==='G'){const s=JSON.parse(d);ball=s.b;pL=s.p;score=s.s;}}};pc.ondatachannel=e=>{dc=e.channel;setupDC(dc);};setupDC(dc);let drg=false,ox,oy;header.onmousedown=e=>{drg=true;ox=e.clientX-ui.offsetLeft;oy=e.clientY-ui.offsetTop;};document.onmousemove=e=>{if(drg){ui.style.left=(e.clientX-ox)+'px';ui.style.top=(e.clientY-oy)+'px';}};document.onmouseup=()=>drg=false;window.onkeydown=e=>{if(e.key==='Escape')ui.style.display=(ui.style.display==='none')?'flex':'none';};})();`;
        
        // Inject the script into the button's href
        const btn = document.querySelector('.bookmark-btn');
        btn.href = "javascript:" + encodeURIComponent(mainScript);
    </script>
</body>
</html>
